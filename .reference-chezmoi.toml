# ══════════════════════════════════════════════════════════════════════════════
# 1Password fields required by chezmoi templates
# Vault: op://Private/chezmoi-data/<field>
# ══════════════════════════════════════════════════════════════════════════════
#
# ── Git ───────────────────────────────────────────────────────────────────────
# git-config-name          → gitName
# git-config-email         → gitEmail
# github-username          → gitGithub.name
# github-email             → gitGithub.email
# github-access-token      → gitGithub.accessToken
# github-signing-key       → gitGithub.gpgsign.signingKey
#
# ── Restic backup ─────────────────────────────────────────────────────────────
# restic-repo              → resticRepo (chezmoi template variable, base path)
# restic-password          → used at runtime by resticprofile password-command
#
# ── Atuin (README only, not templated) ────────────────────────────────────────
# atuin-username           → atuin login
# atuin-password           → atuin login
#
# ── AI tokens (op://Personal/<service>/tokens/emacs) ─────────────────────────
# OpenAI, Anthropic, Gemini, DeepSeek, z.ai, Ollama → aider + authinfo
#
# ── SSH ───────────────────────────────────────────────────────────────────────
# op://Personal/localhost-ssh/public key → authorized_keys
#
# ══════════════════════════════════════════════════════════════════════════════

encryption = "age"
[age]
identity = ""
symmetric = true

[onepassword]
command = "op"
prompt = false

[data]
ephemeral = true
headless = true
hostname = "hostname"
personal = false
osid = "linux-debian"
nixosContainer = false
unameArch = "aarch64"
extraUser = false
useOp = false
gitAutoCommit = false
gitAutoPush = false

workspace = "USER_HOME/workspace"
workspace_extra = "USER_HOME/workspace_extra"
resources = "USER_HOME/workspace/resources"
playground = "USER_HOME/workspace/playground"
managed_sync = "USER_HOME/.local/managed-sync"
org_dir = "USER_HOME/.local/managed-sync/org"
primary_storage = ""
secondary_storage = ""
editor = "emacsclient"
shell = "zsh"

resticRepo = ""

fontsEnabled = false
fontsPath = ""

emacsType = "default"
emacsEnabledClient = false

podmanEnabled = false
dockerEnabled = false
containerEngine = "podman"

goEnabled = false
rustEnabled = false

syncthingAutostart = false

torproxyHost = "localhost"
torproxyPortSocks5 = 9150
torproxyPortDns = 8893

gitName = "USER"
gitEmail = "USER"
gitLocalRepositories = "USER_HOME/.local/git"
gitGithub.name = ""
gitGithub.email = ""
gitGithub.accessToken = ""
gitGithub.gpgsign.enabled = false
gitGithub.gpgsign.signingKey = ""
gitGithub.gpgsign.program = ""

[git]
autoCommit = false
autoPush = false

[interpreters.sh]
command = "sh"

[interpreters.bash]
command = "bash"
