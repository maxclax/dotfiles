name: developing
parent: default

matches:
  # Build & Tests
  - trigger: ";ts"
    replace: "make pytest arg_1="

  # Database
  - trigger: ";mg"
    replace: "make migrate"

  - trigger: ";mm"
    replace: "make mmigrate arg_1="

  # Logs
  - trigger: ";lg"
    replace: "podman logs -f --tail 100"

  # Container ops
  - trigger: ";ds"
    replace: "make ds"

  - trigger: ";rm"
    replace: "make rm"

  - trigger: "'rm"
    replace: "podman ps -aq | xargs -r podman stop | xargs -r podman rm"

  - trigger: "'ri"
    replace: "podman rmi -f $(docker images -a -q)"
